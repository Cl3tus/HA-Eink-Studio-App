name: 🐛 Bug report
description: Something in E-ink Studio doesn't work as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
      placeholder: When I … I expected … but instead …
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open …
        2. Click …
        3. See error
    validations:
      required: true
  - type: input
    id: addon-version
    attributes:
      label: Add-on version
      description: Shown in the add-on info tab (e.g. 3.0.1).
    validations:
      required: true
  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - aarch64
        - amd64
        - other / not sure
    validations:
      required: false
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      description: Settings → About (e.g. 2026.6.0).
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Add-on log output and/or browser console errors. Screenshots help too.
      render: shell
    validations:
      required: false
