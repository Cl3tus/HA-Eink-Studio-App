name: E-ink Studio
version: "1.7.2"
slug: eink_studio
description: WYSIWYG editor for ESPHome e-ink displays — design your layout and generate the lambda + YAML.
url: https://github.com/Cl3tus/HA-Eink-Studio-App
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false

# --- Ingress: verschijnt in de HA-zijbalk, HA regelt de auth ---
ingress: true
ingress_port: 8099
panel_icon: mdi:image-edit
panel_title: E-ink Studio
panel_admin: true

# --- Live preview: lees-toegang tot HA-states via de Supervisor proxy ---
homeassistant_api: true
hassio_api: false

# Projects, fonts and profiles are stored in the add-on config folder,
# reachable over SAMBA at \\<HA-IP>\addon_configs\<slug>.
map:
  - addon_config:rw

# --- User options (Configuration tab) ---
#   language : auto (follow HA / browser) | nl | en
#   theme    : auto (follow HA) | light | dark
options:
  language: auto
  theme: auto
schema:
  language: list(auto|nl|en)
  theme: list(auto|light|dark)
