name: E-ink Studio
version: "1.4.0"
slug: eink_studio
description: WYSIWYG-editor voor ESPHome e-ink displays — ontwerp je layout en genereer de lambda + YAML.
url: https://github.com/Cl3tus/HA-Eink-Studio-App
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false

# --- Ingress: verschijnt in de HA-zijbalk, HA regelt de auth ---
ingress: true
ingress_port: 8099
panel_icon: mdi:image-edit
panel_title: E-ink Studio
panel_admin: true

# --- Live preview: lees-toegang tot HA-states via de Supervisor proxy ---
homeassistant_api: true
hassio_api: false

# Persistente opslag voor projecten + geüploade fonts staat in /data (automatisch persistent).
# addon_configs geeft toegang tot de gedeelde config-map (SAMBA: \\<HA-IP>\addon_configs).
map:
  - addon_config:rw

options:
  samba_host: ""
schema:
  samba_host: str?
